<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none';">
    <title>HackLayer CTF - Profile</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            overflow-y: auto;
        }

        .page {
            max-width: 720px;
            margin: 0 auto;
            padding: 32px 24px 60px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .top-bar .back {
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            transition: border-color .2s;
        }

        .top-bar .back:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .top-bar .ver {
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* User card */
        .user-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 24px;
        }

        .user-card .av {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #00b862);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #000;
            flex-shrink: 0;
        }

        .user-card .info h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .user-card .info span {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .user-card .rank-badge {
            margin-left: auto;
            text-align: center;
        }

        .user-card .rank-badge .num {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .user-card .rank-badge .lbl {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-muted);
        }

        /* Stats row */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .stat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 12px;
            text-align: center;
        }

        .stat .val {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
        }

        .stat .val.accent {
            color: var(--accent);
        }

        .stat .lbl {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .4px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* History */
        .section-head {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .history {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .h-row {
            display: grid;
            grid-template-columns: 2fr 1fr 60px 50px 56px;
            padding: 10px 14px;
            font-size: 11px;
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
        }

        .h-row:last-child {
            border-bottom: none;
        }

        .h-row.head {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .4px;
            color: var(--text-muted);
            font-weight: 500;
            padding: 8px 14px;
            background: var(--bg-elevated);
        }

        .h-row .event {
            color: var(--text);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .h-row .cat {
            color: var(--text-secondary);
        }

        .h-row .pts {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-weight: 600;
        }

        .h-row .flags {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
        }

        .tag {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .3px;
        }

        .tag-w {
            background: rgba(0, 232, 123, 0.12);
            color: #00e87b;
        }

        .tag-l {
            background: rgba(255, 80, 80, 0.1);
            color: #ff6060;
        }

        .tag-a {
            background: rgba(0, 150, 255, 0.1);
            color: #0096ff;
        }

        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-muted);
            font-size: 12px;
        }

        /* Update toast */
        .update-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--bg-elevated);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
            transition: transform .3s ease;
            z-index: 100;
        }

        .update-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .update-toast button {
            padding: 5px 12px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 10px;
        }

        /* Loading pulse */
        @keyframes pulse {

            0%,
            100% {
                opacity: .4;
            }

            50% {
                opacity: 1;
            }
        }

        .loading .val,
        .loading .event {
            animation: pulse 1.2s infinite;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="top-bar">
            <button class="back" onclick="window.ctfAPI.navigate('category.html')">← Events</button>
            <span class="ver" id="ver"></span>
        </div>

        <div class="user-card">
            <div class="av" id="avatar">?</div>
            <div class="info">
                <h2 id="name">—</h2>
                <span id="email"></span>
            </div>
            <div class="rank-badge">
                <div class="num" id="rank">#-</div>
                <div class="lbl">Rank</div>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="val accent" id="score">0</div>
                <div class="lbl">Score</div>
            </div>
            <div class="stat">
                <div class="val" id="flags">0</div>
                <div class="lbl">Flags</div>
            </div>
            <div class="stat">
                <div class="val" id="games">0</div>
                <div class="lbl">Games</div>
            </div>
            <div class="stat">
                <div class="val" id="wins">0</div>
                <div class="lbl">Wins</div>
            </div>
            <div class="stat">
                <div class="val" id="streak">0</div>
                <div class="lbl">Best Streak</div>
            </div>
            <div class="stat">
                <div class="val" id="rate">0%</div>
                <div class="lbl">Win Rate</div>
            </div>
        </div>

        <div class="section-head">Recent Games</div>
        <div class="history" id="history">
            <div class="empty-state">Loading...</div>
        </div>
    </div>

    <div class="offline-bar" id="offlineBar">No Internet Connection</div>

    <div class="update-toast" id="updateToast">
        <span>v<span id="updateVer"></span> available</span>
        <button onclick="window.ctfAPI.installUpdate()">Update</button>
    </div>

    <script>
        // Offline indicator
        window.addEventListener('offline', () => document.getElementById('offlineBar').classList.add('show'));
        window.addEventListener('online', () => document.getElementById('offlineBar').classList.remove('show'));
        if (!navigator.onLine) document.getElementById('offlineBar').classList.add('show');

        const token = sessionStorage.getItem('ctf_token');
        const user = JSON.parse(sessionStorage.getItem('ctf_user') || '{}');
        let refreshTimer;

        window.ctfAPI.onUpdateDownloaded((version) => {
            document.getElementById('updateVer').textContent = version;
            document.getElementById('updateToast').classList.add('show');
        });

        // Helper: only update DOM if value changed (prevents flicker)
        function setIfChanged(id, value) {
            const el = document.getElementById(id);
            if (el && el.textContent !== String(value)) el.textContent = value;
        }

        async function load() {
            if (!token) { window.ctfAPI.navigate('login.html'); return; }

            // Instant user info
            const name = user.display_name || user.username || '?';
            setIfChanged('name', name);
            setIfChanged('email', user.email || '');
            setIfChanged('avatar', name[0].toUpperCase());

            try {
                // Stats
                const p = await window.ctfAPI.request('/profile', 'GET', null, token);
                if (p.status === 200 && p.data) {
                    const d = p.data;
                    setIfChanged('score', d.total_score || 0);
                    setIfChanged('flags', d.total_flags || 0);
                    setIfChanged('games', d.total_games || 0);
                    setIfChanged('wins', d.total_wins || 0);
                    setIfChanged('streak', d.best_streak || 0);
                    setIfChanged('rank', d.rank ? '#' + d.rank : '#-');
                    const rate = d.total_games > 0 ? Math.round((d.total_wins / d.total_games) * 100) : 0;
                    setIfChanged('rate', rate + '%');
                }
            } catch (e) { /* silent */ }

            try {
                // History
                const h = await window.ctfAPI.request('/history?per_page=15', 'GET', null, token);
                const box = document.getElementById('history');
                if (h.status === 200 && h.data && h.data.sessions && h.data.sessions.length > 0) {
                    box.innerHTML = '<div class="h-row head"><span>Event</span><span>Category</span><span>Pts</span><span>Flags</span><span>Result</span></div>' +
                        h.data.sessions.map(s => {
                            let tag = '';
                            if (s.is_winner) tag = '<span class="tag tag-w">Win</span>';
                            else if (s.finished_at) tag = '<span class="tag tag-l">Done</span>';
                            else tag = '<span class="tag tag-a">Live</span>';
                            return `<div class="h-row">
                            <span class="event">${esc(s.event_title || '-')}</span>
                            <span class="cat">${esc(s.category || '-')}</span>
                            <span class="pts">${s.score || 0}</span>
                            <span class="flags">${s.flags_solved || 0}</span>
                            <span>${tag}</span>
                        </div>`;
                        }).join('');
                } else {
                    box.innerHTML = '<div class="empty-state">No games yet — join an event to get started.</div>';
                }
            } catch (e) {
                document.getElementById('history').innerHTML = '<div class="empty-state">No games yet — join an event to get started.</div>';
            }

            // Version
            try {
                const cfg = await window.ctfAPI.getConfig();
                document.getElementById('ver').textContent = 'v' + (cfg.version || '1.0.0');
            } catch (e) { /* silent */ }
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // Initial load + auto-refresh every 30s
        load();
        refreshTimer = setInterval(load, 30000);
    </script>
</body>

</html>
