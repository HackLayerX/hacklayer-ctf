<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none';">
    <title>HackLayer CTF - Profile</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #000;
            font-weight: bold;
        }

        .profile-info h1 {
            margin: 0;
            font-size: 22px;
        }

        .profile-info p {
            margin: 4px 0 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-card .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .history-section h2 {
            margin-bottom: 12px;
            font-size: 16px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .history-table th,
        .history-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        .history-table th {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 10px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }

        .badge-win {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
        }

        .badge-loss {
            background: rgba(255, 68, 68, 0.1);
            color: #ff6666;
        }

        .badge-active {
            background: rgba(0, 170, 255, 0.15);
            color: #00aaff;
        }

        .nav-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .nav-bar button {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 12px;
        }

        .nav-bar button:hover {
            border-color: var(--primary);
        }

        .update-banner {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }

        .update-banner.show {
            display: flex;
        }

        .update-banner button {
            margin-left: auto;
            padding: 5px 12px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
        }

        .loading-text {
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
        }

        .version-text {
            font-size: 10px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="profile-container">
        <div class="nav-bar">
            <button onclick="window.ctfAPI.navigate('category.html')">← Back to Events</button>
            <button onclick="loadProfile()">🔄 Refresh</button>
        </div>

        <div class="update-banner" id="updateBanner">
            <span>🎉 Update v<span id="updateVersion"></span> available!</span>
            <button onclick="installUpdate()">Install & Restart</button>
        </div>

        <div class="profile-header">
            <div class="profile-avatar" id="avatar">?</div>
            <div class="profile-info">
                <h1 id="displayName">Loading...</h1>
                <p id="userEmail"></p>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="value" id="totalGames">-</div>
                <div class="label">Total Games</div>
            </div>
            <div class="stat-card">
                <div class="value" id="totalFlags">-</div>
                <div class="label">Flags Captured</div>
            </div>
            <div class="stat-card">
                <div class="value" id="totalScore">-</div>
                <div class="label">Total Score</div>
            </div>
            <div class="stat-card">
                <div class="value" id="totalWins">-</div>
                <div class="label">Wins</div>
            </div>
            <div class="stat-card">
                <div class="value" id="winStreak">-</div>
                <div class="label">Best Streak</div>
            </div>
            <div class="stat-card">
                <div class="value" id="winRate">-</div>
                <div class="label">Win Rate</div>
            </div>
        </div>

        <div class="history-section">
            <h2>Recent Games</h2>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Event</th>
                        <th>Category</th>
                        <th>Score</th>
                        <th>Flags</th>
                        <th>Result</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr>
                        <td colspan="6" class="loading-text">Loading history...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="version-text" id="versionText"></div>
    </div>

    <script>
        let token = sessionStorage.getItem('ctf_token');
        let user = JSON.parse(sessionStorage.getItem('ctf_user') || '{}');

        // Auto-update listeners
        window.ctfAPI.onUpdateDownloaded((version) => {
            document.getElementById('updateVersion').textContent = version;
            document.getElementById('updateBanner').classList.add('show');
        });

        function installUpdate() {
            window.ctfAPI.installUpdate();
        }

        async function loadProfile() {
            if (!token) {
                window.ctfAPI.navigate('login.html');
                return;
            }

            // Show user basics immediately
            document.getElementById('displayName').textContent = user.display_name || user.username || '?';
            document.getElementById('userEmail').textContent = user.email || '';
            document.getElementById('avatar').textContent = (user.display_name || '?')[0].toUpperCase();

            // Fetch stats
            const profileRes = await window.ctfAPI.request('/profile', 'GET', null, token);
            if (profileRes.status === 200 && profileRes.data) {
                const d = profileRes.data;
                document.getElementById('totalGames').textContent = d.total_games || 0;
                document.getElementById('totalFlags').textContent = d.total_flags || 0;
                document.getElementById('totalScore').textContent = d.total_score || 0;
                document.getElementById('totalWins').textContent = d.total_wins || 0;
                document.getElementById('winStreak').textContent = d.best_streak || 0;
                const rate = d.total_games > 0 ? Math.round((d.total_wins / d.total_games) * 100) : 0;
                document.getElementById('winRate').textContent = rate + '%';
            }

            // Fetch history
            const histRes = await window.ctfAPI.request('/history?per_page=20', 'GET', null, token);
            if (histRes.status === 200 && histRes.data && histRes.data.sessions) {
                const tbody = document.getElementById('historyBody');
                if (histRes.data.sessions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="loading-text">No games played yet.</td></tr>';
                } else {
                    tbody.innerHTML = histRes.data.sessions.map(s => {
                        let badge = '';
                        if (s.is_winner) badge = '<span class="badge badge-win">WIN</span>';
                        else if (s.finished_at) badge = '<span class="badge badge-loss">DONE</span>';
                        else badge = '<span class="badge badge-active">ACTIVE</span>';

                        const date = s.joined_at ? new Date(s.joined_at).toLocaleDateString() : '-';
                        return `<tr>
                            <td>${escHtml(s.event_title || '-')}</td>
                            <td>${escHtml(s.category || '-')}</td>
                            <td>${s.score || 0}</td>
                            <td>${s.flags_solved || 0}</td>
                            <td>${badge}</td>
                            <td>${date}</td>
                        </tr>`;
                    }).join('');
                }
            }

            // Show version
            const config = await window.ctfAPI.getConfig();
            document.getElementById('versionText').textContent = 'HackLayer CTF v' + (config.version || '1.0.0');
        }

        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        loadProfile();
    </script>
</body>

</html>
