<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161921"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e87b"/>
      <stop offset="100%" stop-color="#00b85f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>
  <rect x="16" y="16" width="224" height="224" rx="32" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.25"/>
  <!-- Shield shape -->
  <path d="M128 40 L190 70 L190 130 C190 170 165 200 128 216 C91 200 66 170 66 130 L66 70 Z" 
        fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4" filter="url(#glow)"/>
  <!-- HL text -->
  <text x="128" y="155" text-anchor="middle" font-family="Consolas,monospace" font-size="72" font-weight="bold" fill="url(#accent)" filter="url(#glow)">HL</text>
  <!-- Scan line effect -->
  <line x1="80" y1="175" x2="176" y2="175" stroke="#00e87b" stroke-width="2" opacity="0.5"/>
</svg>
