stages:
  - build
  - release

variables:
  NODE_VERSION: "20"

# ==================== BUILD JOBS ====================

build:windows:
  stage: build
  tags:
    - shared-windows
    - windows-1809
  variables:
    FF_USE_POWERSHELL_PATH_RESOLVER: "true"
  before_script:
    - choco install nodejs --version=$NODE_VERSION -y --no-progress
    - refreshenv
    - node --version
    - npm --version
  script:
    - npm ci
    - npm run build:win
  artifacts:
    paths:
      - dist/*.exe
    expire_in: 1 week

build:linux:
  stage: build
  image: electronuserland/builder:16
  tags:
    - linux
  script:
    - npm ci
    - npm run build:linux
  artifacts:
    paths:
      - dist/*.AppImage
    expire_in: 1 week

build:mac:
  stage: build
  tags:
    - saas-macos-medium-m1
  before_script:
    - brew install node@20
    - export PATH="/opt/homebrew/opt/node@20/bin:$PATH"
    - node --version
    - npm --version
  script:
    - npm ci
    - npm run build:mac
  artifacts:
    paths:
      - dist/*.dmg
    expire_in: 1 week
  allow_failure: true

# ==================== RELEASE ====================

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - linux
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs:
    - job: build:windows
      artifacts: true
    - job: build:linux
      artifacts: true
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "HackLayer CTF $CI_COMMIT_TAG"
    description: "Automated release for $CI_COMMIT_TAG"
    assets:
      links:
        - name: "HackLayer-CTF-Setup (Windows EXE)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/HackLayer-CTF-Setup-${CI_COMMIT_TAG#v}.exe?job=build:windows"
          link_type: package
        - name: "HackLayer-CTF (Linux AppImage)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/HackLayer-CTF-${CI_COMMIT_TAG#v}.AppImage?job=build:linux"
          link_type: package
